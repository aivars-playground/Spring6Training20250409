services:
  mongo_cache:
    image: mongo
    container_name: training.mongo_cache
    restart: always
    ports:
      - 27017:27017
    volumes:
      - mongo_cache_data_db:/data/db
      - mongo_cache_config_db:/data/configdb

  p01_basic:
    build:
      context: ./P01_BASICS
      dockerfile: ./Dockerfile
    container_name: training.web
    ports:
      - 8080:8080
    restart: on-failure
    environment:
      MONGO_CACHE_URL : "mongodb://training.mongo_cache:27017"
    depends_on:
      - mongo_cache

volumes:
  mongo_cache_data_db:
  mongo_cache_config_db:
